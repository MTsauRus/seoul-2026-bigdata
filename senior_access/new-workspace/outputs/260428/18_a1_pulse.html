<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>꺼져가는 심장 — 서울 노인의 보행권</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
body{background:#06111e;color:#dde6f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#hdr{
  background:#060e1a;border-bottom:1px solid #0e1f30;
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
#hdr h1{font-size:.95rem;font-weight:700}
#hdr .sub{font-size:.63rem;color:#3a5368;margin-top:2px}

.ctrl{display:flex;align-items:center;gap:10px}
select{background:#0a1828;color:#7a99b0;border:1px solid #1a2c3e;border-radius:5px;padding:4px 8px;font-size:.7rem}
.tpill{padding:3px 9px;border-radius:999px;font-size:.65rem;cursor:pointer;
  border:1px solid #1a2c3e;background:transparent;color:#3a5368;transition:.15s}
.tpill.on{border-color:rgba(255,255,255,.25);color:#aec4d4;background:rgba(255,255,255,.04)}

/* 레이아웃 */
#body{flex:1;display:flex;overflow:hidden}
#left{flex:1;position:relative}
#map{position:absolute;inset:0}
#right{width:280px;flex-shrink:0;background:#060e1a;border-left:1px solid #0e1f30;
  display:flex;flex-direction:column;padding:0;overflow:hidden}

/* 우측 패널 상단: 속도 목록 */
#spd-list{padding:14px;border-bottom:1px solid #0e1f30}
.srow{
  display:flex;align-items:center;gap:8px;padding:7px 8px;
  border-radius:8px;border:1px solid transparent;margin-bottom:4px;
  cursor:pointer;transition:all .4s;opacity:.28;
}
.srow.active{opacity:1;border-color:var(--c);background:color-mix(in srgb,var(--c) 10%,transparent)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--c);flex-shrink:0;
  transition:transform .4s}
.srow.active .sdot{transform:scale(1.4)}
.sname{font-size:.7rem;color:#c9d9e8;line-height:1.2}
.smps{font-size:.58rem;color:#3a5368}
.sratio{font-size:.75rem;font-weight:700;color:var(--c);margin-left:auto}

/* 심전도 영역 */
#ecg-wrap{
  flex:1;display:flex;flex-direction:column;padding:14px;gap:10px;
  position:relative;overflow:hidden;
}
#ecg-label{font-size:.6rem;color:#3a5368;letter-spacing:.08em;text-transform:uppercase}
#ecg-cv{width:100%;flex:1;display:block}

/* 경고 배지 */
#warn{
  padding:8px 10px;border-radius:7px;font-size:.68rem;
  border:1px solid transparent;transition:all .5s;
  display:flex;align-items:center;gap:6px;
}
#warn.danger{border-color:#C62828;background:rgba(198,40,40,.1);color:#ef9a9a;animation:blink 1.2s infinite}
#warn.ok{border-color:#1a2c3e;color:#3a5368}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* 통계 카드 */
#stats-row{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
  padding:12px 14px;border-top:1px solid #0e1f30;
}
.sc{background:#080f1c;border-radius:8px;padding:8px 10px;
  border:1px solid #0e1f30;}
.sc-lbl{font-size:.58rem;color:#3a5368;margin-bottom:3px}
.sc-val{font-size:.95rem;font-weight:700;color:#fff;transition:color .4s}

/* 재생 */
#play-wrap{padding:10px 14px;border-top:1px solid #0e1f30;display:flex;gap:8px;align-items:center}
#play-btn{
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid #243548;background:rgba(59,130,246,.1);
  color:#3b82f6;font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
#play-btn.playing{border-color:#34A853;color:#34A853;background:rgba(52,168,83,.1)}
.dots{display:flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#1a2c3e;transition:all .3s;cursor:pointer}
.dot.on{background:var(--c);box-shadow:0 0 6px var(--c)}

/* 출발점 펄스 마커 CSS */
.pulse-ring{
  border-radius:50%;border:2px solid var(--pc,#fff);
  animation:pulseRing var(--pd,1s) ease-out infinite;
  opacity:0;position:absolute;
}
@keyframes pulseRing{
  0%{transform:scale(.5);opacity:.8}
  100%{transform:scale(2.8);opacity:0}
}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <h1>꺼져가는 심장</h1>
    <div class="sub">보행 속도가 느려질수록 삶의 박동이 약해진다</div>
  </div>
  <div class="ctrl">
    <div style="display:flex;gap:4px">
      <button class="tpill" onclick="setTime(15,this)">15분</button>
      <button class="tpill on"  onclick="setTime(30,this)">30분</button>
      <button class="tpill" onclick="setTime(45,this)">45분</button>
    </div>
    <select id="sel-pt" onchange="onPtChange()"></select>
  </div>
</div>

<div id="body">
  <div id="left">
    <div id="map"></div>
  </div>

  <div id="right">
    <div id="spd-list"></div>

    <div id="ecg-wrap">
      <div id="ecg-label">심전도 · 보행 생명력</div>
      <canvas id="ecg-cv"></canvas>
      <div id="warn" class="ok">
        <span id="warn-dot" style="width:7px;height:7px;border-radius:50%;background:#3a5368;flex-shrink:0"></span>
        <span id="warn-txt">정상 범위</span>
      </div>
    </div>

    <div id="stats-row">
      <div class="sc">
        <div class="sc-lbl">도달 면적</div>
        <div class="sc-val" id="v-area">—</div>
      </div>
      <div class="sc">
        <div class="sc-lbl">면적 유지율</div>
        <div class="sc-val" id="v-ratio">—</div>
      </div>
      <div class="sc">
        <div class="sc-lbl">30분 도달 반경</div>
        <div class="sc-val" id="v-km">—</div>
      </div>
      <div class="sc">
        <div class="sc-lbl">면적 손실</div>
        <div class="sc-val" id="v-loss">—</div>
      </div>
    </div>

    <div id="play-wrap">
      <button id="play-btn" onclick="togglePlay()">▶</button>
      <div class="dots" id="dots"></div>
    </div>
  </div>
</div>

// ECG 파형 생성: P파 + QRS 복합 + T파
function ecgWave(phase,amp,irregFactor){
  // phase: 0~1, amp: 0~1, irregFactor: 0~1 (불규칙 정도)
  const jitter = irregFactor*(Math.random()-.5)*.15;
  const p = (phase + jitter + 1) % 1;
  // P파 (0.0~0.15)
  if(p < 0.15) return amp * 0.18 * Math.sin(p/0.15*Math.PI);
  // Q (0.15~0.22)
  if(p < 0.22) return -amp * 0.12 * Math.sin((p-0.15)/0.07*Math.PI);
  // R spike (0.22~0.30)
  if(p < 0.30) return amp * Math.sin((p-0.22)/0.08*Math.PI);
  // S (0.30~0.38)
  if(p < 0.38) return -amp * 0.22 * Math.sin((p-0.30)/0.08*Math.PI);
  // ST (0.38~0.52)
  if(p < 0.52) return amp * 0.04 * (1-Math.sin((p-0.38)/0.14*Math.PI));
  // T파 (0.52~0.72)
  if(p < 0.72) return amp * 0.32 * Math.sin((p-0.52)/0.20*Math.PI);
  // 등전위 (0.72~1.0)
  return amp*(irregFactor>0.3?(Math.random()-.5)*irregFactor*.08:0);
}

  ecgLastT=ts;
  const s=SPDS[curFrame];
  const speedPx=120; // 픽셀/초 스크롤 속도
  const W=ecgCv.offsetWidth, H=ecgCv.offsetHeight;
  if(ecgCv.width!==W||ecgCv.height!==H){ecgCv.width=W;ecgCv.height=H;}
  const cx=ecgCtx;
  const cy=H/2;
  const amp=(H/2)*0.75*s.amp;
  const bpsec=s.bpm/60; // 주기 수/초
  const dPhase=bpsec*dt; // 이 프레임에서 진행한 위상

  // 스크롤: 전체 이미지를 왼쪽으로 밀기
  const dx=Math.round(speedPx*dt);
  const imgData=cx.getImageData(dx,0,W-dx,H);
  cx.putImageData(imgData,0,0);
  cx.clearRect(W-dx,0,dx,H);

  // 그리드 (가끔 세로 선)
  cx.strokeStyle='rgba(255,255,255,.04)';
  cx.lineWidth=1;
  const gridX=Math.floor(ecgX/40)*40;
  for(let gx=gridX; gx<gridX+dx+40; gx+=40){
    const screenX=W-(ecgX+dx-gx)-dx;
    if(screenX>0&&screenX<W){
      cx.beginPath();cx.moveTo(screenX,0);cx.lineTo(screenX,H);cx.stroke();
    }
  }

  // 새 파형 그리기
  cx.strokeStyle=s.color;
  cx.lineWidth=1.8;
  cx.shadowColor=s.color;
  cx.shadowBlur=curFrame>=2?6:3;
  cx.beginPath();
  const steps=Math.max(1,Math.round(dx));
  for(let i=0;i<=steps;i++){
    const xPx=W-dx+i;
    const ph=(ecgPhase+(dPhase*i/steps))%1;
    const y=cy-ecgWave(ph,amp,s.irregular);
    i===0?cx.moveTo(xPx,y):cx.lineTo(xPx,y);
  }
  cx.stroke();
  cx.shadowBlur=0;

  ecgX+=dx;
  ecgPhase=(ecgPhase+dPhase)%1;
  ecgRaf=requestAnimationFrame(drawEcg);
}

function startEcg(){
  if(ecgRaf)cancelAnimationFrame(ecgRaf);
  ecgLastT=null; ecgX=0; ecgPhase=0;
  const W=ecgCv.offsetWidth,H=ecgCv.offsetHeight;
  ecgCv.width=W; ecgCv.height=H;
  ecgCtx.clearRect(0,0,W,H);
  ecgRaf=requestAnimationFrame(drawEcg);
}

// ── 펄스 마커 ────────────────────────────────────────────────────────────────
function buildPulseMarker(pt){
  if(pulseMarker) map.removeLayer(pulseMarker);
  const s=SPDS[curFrame];
  // 중심점
  pulseMarker=L.circleMarker([pt.lat,pt.lon],{
    radius:5,fillColor:s.color,fillOpacity:.9,color:'#fff',weight:1.5
  }).addTo(map);
  // 펄스 링 (CSS 클래스 애니메이션)
  const icon=L.divIcon({
    className:'',
    html:`<div style="position:relative;width:0;height:0">
      <div class="pulse-ring" style="--pc:${s.color};--pd:${2/s.mps}s;width:28px;height:28px;left:-14px;top:-14px"></div>
      <div class="pulse-ring" style="--pc:${s.color};--pd:${2/s.mps}s;width:28px;height:28px;left:-14px;top:-14px;animation-delay:.5s"></div>
    </div>`,
    iconSize:[0,0],iconAnchor:[0,0]
  });
  L.marker([pt.lat,pt.lon],{icon,interactive:false}).addTo(map);
}

// ── GeoJSON 레이어 ──────────────────────────────────────────────────────────
function buildLayer(){
  if(geoLayer) map.removeLayer(geoLayer);
  const s=SPDS[curFrame];
  const iso=ISO[curPt]?.[s.id]?.[String(curTime)];
  if(!iso) return;
  geoLayer=L.geoJSON(iso,{
    style:{fillColor:s.color,fillOpacity:.18,color:s.color,weight:1.8,opacity:.7}
  }).addTo(map);
}

// ── UI 업데이트 ──────────────────────────────────────────────────────────────
function updateUI(){
  const s=SPDS[curFrame];
  const area0=AREAS[curPt]?.g0?.[String(curTime)]||1;
  const areaI=AREAS[curPt]?.[s.id]?.[String(curTime)]||0;
  const ratio=Math.round(areaI/area0*100);
  const loss=Math.round((1-areaI/area0)*100);
  const km=(s.mps*curTime*60/1000).toFixed(2);
  document.getElementById('v-area').textContent=areaI.toFixed(1)+' km²';
  document.getElementById('v-area').style.color=s.color;
  document.getElementById('v-ratio').textContent=ratio+'%';
  document.getElementById('v-ratio').style.color=s.color;
  document.getElementById('v-km').textContent=km+' km';
  document.getElementById('v-loss').textContent=curFrame===0?'—':(loss+'% 손실');
  document.getElementById('v-loss').style.color=curFrame===0?'#3a5368':s.color;
  // 경고
  const warnEl=document.getElementById('warn');
  const wdot=document.getElementById('warn-dot');
  warnEl.className=s.warn?'danger':'ok';
  wdot.style.background=s.warn?s.color:'#3a5368';
  document.getElementById('warn-txt').textContent=s.warnTxt;
  // 행 강조
  document.querySelectorAll('.srow').forEach((r,i)=>r.classList.toggle('active',i===curFrame));
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('on',i===curFrame);
    d.style.setProperty('--c',SPDS[i].color);
  });
}

// ── 전환 ─────────────────────────────────────────────────────────────────────
function goTo(f){
  curFrame=f;
  buildLayer();
  const pt=PTS.find(p=>p.id===curPt);
  buildPulseMarker(pt);
  startEcg();
  updateUI();
  if(isPlaying) scheduleNext();
}

function scheduleNext(){
  clearTimeout(holdTimer);
  holdTimer=setTimeout(()=>goTo((curFrame+1)%4),HOLD);
}

function togglePlay(){
  isPlaying=!isPlaying;
  const btn=document.getElementById('play-btn');
  btn.textContent=isPlaying?'⏸':'▶';
  btn.classList.toggle('playing',isPlaying);
  if(isPlaying) scheduleNext();
  else clearTimeout(holdTimer);
}

function setTime(t,btn){
  curTime=t;
  document.querySelectorAll('.tpill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  buildLayer(); updateUI();
}

function onPtChange(){
  curPt=document.getElementById('sel-pt').value;
  const pt=PTS.find(p=>p.id===curPt);
  if(pt) map.setView([pt.lat,pt.lon],13,{animate:false});
  buildLayer(); buildPulseMarker(pt); updateUI();
}

// ── DOM 초기화 ───────────────────────────────────────────────────────────────
const selPt=document.getElementById('sel-pt');
PTS.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;selPt.appendChild(o);});

const srowEl=document.getElementById('spd-list');
const dotsEl=document.getElementById('dots');
SPDS.forEach((s,i)=>{
  const area0=AREAS['p0']?.g0?.[String(curTime)]||1;
  const areaI=AREAS['p0']?.[s.id]?.[String(curTime)]||0;
  const div=document.createElement('div');
  div.className='srow'; div.style.setProperty('--c',s.color);
  div.innerHTML=`<div class="sdot"></div>
    <div><div class="sname">${s.label}</div><div class="smps">${s.mps} m/s · ${s.bpm} bpm</div></div>
    <div class="sratio">${Math.round(areaI/area0*100)}%</div>`;
  div.onclick=()=>goTo(i);
  srowEl.appendChild(div);
  const dot=document.createElement('div');
  dot.className='dot'; dot.style.setProperty('--c',s.color);
  dot.onclick=()=>goTo(i);
  dotsEl.appendChild(dot);
});

// ── 시작 ─────────────────────────────────────────────────────────────────────
const initPt=PTS[0];
map.setView([initPt.lat,initPt.lon],13);
goTo(0);
</script>
</body>
