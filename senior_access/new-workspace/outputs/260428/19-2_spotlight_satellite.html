<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>빛이 꺼진다 — 위성사진</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
body{background:#000;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#hdr{
  background:rgba(0,0,0,.95);border-bottom:1px solid rgba(255,255,255,.05);
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;z-index:900;
}
#hdr h1{font-size:.95rem;font-weight:700;letter-spacing:.05em}
#hdr .sub{font-size:.65rem;color:#444;margin-top:2px}
.ctrl{display:flex;align-items:center;gap:10px}

select{background:rgba(20,20,20,.9);color:#888;border:1px solid rgba(255,255,255,.08);
  border-radius:5px;padding:4px 8px;font-size:.7rem;cursor:pointer}

#map-wrap{flex:1;position:relative;overflow:hidden}
#map{position:absolute;inset:0}
#mask-cv{position:absolute;inset:0;pointer-events:none;z-index:500}

#msg{
  position:absolute;bottom:0;left:0;right:0;z-index:600;
  padding:28px 24px;
  background:linear-gradient(transparent,rgba(0,0,0,.85) 40%);
  pointer-events:none;text-align:center;
}
#msg-quote{
  font-size:.85rem;color:rgba(255,255,255,.45);
  letter-spacing:.08em;margin-bottom:10px;
  transition:color .5s;
}
#msg-area{
  font-size:3.2rem;font-weight:900;line-height:1;
  text-shadow:0 0 60px currentColor;
  transition:color .6s, font-size .3s;
}
#msg-sub{font-size:.72rem;color:rgba(255,255,255,.35);margin-top:8px;letter-spacing:.05em}

#panel{
  position:absolute;top:14px;right:14px;z-index:700;width:195px;
  background:rgba(0,0,0,.82);border:1px solid rgba(255,255,255,.07);
  border-radius:12px;padding:14px;backdrop-filter:blur(10px);
}
#panel .ttl{font-size:.62rem;color:#444;letter-spacing:.08em;margin-bottom:10px;text-transform:uppercase}
.srow{
  display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:7px;
  border:1px solid transparent;margin-bottom:5px;cursor:pointer;
  transition:all .4s;opacity:.3;
}
.srow.active{opacity:1;border-color:var(--c);background:color-mix(in srgb,var(--c) 12%,transparent)}
.sdot{width:9px;height:9px;border-radius:50%;background:var(--c);flex-shrink:0}
.sname{font-size:.7rem;color:#ccc;line-height:1.25}
.smps{font-size:.58rem;color:#555}
.sarea{font-size:.68rem;font-weight:700;color:var(--c);margin-left:auto;white-space:nowrap}

#play-wrap{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:700;display:flex;gap:8px;align-items:center;
}
#play-btn{
  width:38px;height:38px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.05);
  color:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;
}
#play-btn:hover{background:rgba(255,255,255,.12)}
#play-btn.playing{border-color:#34A853;color:#34A853}

.time-pills{display:flex;gap:4px}
.tpill{
  padding:3px 9px;border-radius:999px;font-size:.65rem;cursor:pointer;
  border:1px solid rgba(255,255,255,.1);background:transparent;color:#555;transition:.15s;
}
.tpill.on{border-color:rgba(255,255,255,.35);color:#ccc;background:rgba(255,255,255,.06)}

#dots{display:flex;gap:5px;align-items:center}
.dot{
  width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);
  transition:all .3s;
}
.dot.active{background:var(--c);box-shadow:0 0 8px var(--c)}

#badge{
  position:absolute;top:14px;left:14px;z-index:700;
  background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;padding:6px 10px;font-size:.6rem;color:#555;
  backdrop-filter:blur(8px);
}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <h1>빛이 꺼진다 · Satellite</h1>
    <div class="sub">위성사진 위 — 어둠 속에 남은 것만이 갈 수 있는 서울</div>
  </div>
  <div class="ctrl">
    <div class="time-pills">
      <button class="tpill" onclick="setTime(15,this)">15분</button>
      <button class="tpill on" onclick="setTime(30,this)">30분</button>
      <button class="tpill" onclick="setTime(45,this)">45분</button>
    </div>
    <select id="sel-pt" onchange="onPtChange()"></select>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <canvas id="mask-cv"></canvas>

  <div id="badge">Esri WorldImagery</div>

  <div id="msg">
    <div id="msg-quote">일반인의 30분</div>
    <div id="msg-area" style="color:#4285F4">100%</div>
    <div id="msg-sub">일반인 대비 도달 가능 면적 유지율</div>
  </div>

  <div id="panel">
    <div class="ttl">보행자 유형</div>
    <div id="srows"></div>
  </div>

  <div id="play-wrap">
    <div id="dots"></div>
    <button id="play-btn" onclick="togglePlay()">▶</button>
  </div>
</div>

const cv = document.getElementById('mask-cv');
let curFrame=0, curTime=30, curPt='p0', transitioning=false, isPlaying=false;
let holdTimer=null;
const HOLD=2400;

function syncSize(){
  const w=cv.parentElement.clientWidth, h=cv.parentElement.clientHeight;
  if(w>0&&h>0){cv.width=w;cv.height=h;}
}
window.addEventListener('resize',()=>{syncSize();redraw();});

function getCoords(frame,t,pt){
  const iso=ISO[pt]?.[SPDS[frame].id]?.[String(t)];
  return iso?.coordinates?.[0]||null;
}

function drawMask(alpha,coords){
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  if(alpha<=0) return;
  ctx.fillStyle=`rgba(0,0,0,${Math.min(alpha,1)})`;
  ctx.fillRect(0,0,cv.width,cv.height);
  if(coords){
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();
    coords.forEach(([lng,lat],i)=>{
      const p=map.latLngToContainerPoint([lat,lng]);
      i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);
    });
    ctx.closePath();
    ctx.fill();
    ctx.globalCompositeOperation='source-over';
  }
}

function redraw(){drawMask(SPDS[curFrame].dark,getCoords(curFrame,curTime,curPt));}
map.on('move zoomend viewreset',redraw);

function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function tween(ms,fn){
  return new Promise(res=>{
    const t0=performance.now();
    (function step(now){
      const p=Math.min((now-t0)/ms,1);
      fn(ease(p));
      p<1?requestAnimationFrame(step):res();
    })(t0);
  });
}

async function goTo(newFrame){
  if(transitioning)return;
  transitioning=true;
  const old=SPDS[curFrame];
  const oldCoords=getCoords(curFrame,curTime,curPt);
  await tween(380,t=>drawMask(old.dark+(1-old.dark)*t,oldCoords));
  curFrame=newFrame;
  updateUI();
  const newS=SPDS[newFrame];
  const newCoords=getCoords(newFrame,curTime,curPt);
  await tween(480,t=>drawMask(1-(1-newS.dark)*t,newCoords));
  transitioning=false;
  if(isPlaying)scheduleNext();
}

function scheduleNext(){
  clearTimeout(holdTimer);
  holdTimer=setTimeout(()=>goTo((curFrame+1)%4),HOLD);
}

function updateUI(){
  const s=SPDS[curFrame];
  const area0=AREAS['p0']?.g0?.[String(curTime)]||1;
  const areaI=AREAS['p0']?.[s.id]?.[String(curTime)]||0;
  const ratio=Math.round(areaI/area0*100);
  document.getElementById('msg-quote').textContent=s.quote;
  const aEl=document.getElementById('msg-area');
  aEl.textContent=ratio+'%';
  aEl.style.color=s.color;
  aEl.style.fontSize=curFrame===3?'4.8rem':'3.2rem';
  document.getElementById('msg-sub').textContent=
    curFrame===0?`${areaI.toFixed(1)} km² 도달 가능 · 기준값`:
    `${areaI.toFixed(1)} km² 도달 가능 · 일반인 대비 ${ratio}% 유지`;
  document.querySelectorAll('.srow').forEach((r,i)=>r.classList.toggle('active',i===curFrame));
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('active',i===curFrame);
    d.style.setProperty('--c',SPDS[i].color);
  });
}

function togglePlay(){
  isPlaying=!isPlaying;
  const btn=document.getElementById('play-btn');
  btn.textContent=isPlaying?'⏸':'▶';
  btn.classList.toggle('playing',isPlaying);
  if(isPlaying)scheduleNext();
  else clearTimeout(holdTimer);
}

function setTime(t,btn){
  curTime=t;
  document.querySelectorAll('.tpill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  redraw(); updateUI();
}

function onPtChange(){
  curPt=document.getElementById('sel-pt').value;
  const pt=PTS.find(p=>p.id===curPt);
  if(pt) map.setView([pt.lat,pt.lon],13,{animate:false});
  redraw(); updateUI();
}

const selPt=document.getElementById('sel-pt');
PTS.forEach(p=>{
  const o=document.createElement('option');
  o.value=p.id; o.textContent=p.name; selPt.appendChild(o);
});

const srowsEl=document.getElementById('srows');
const dotsEl=document.getElementById('dots');
SPDS.forEach((s,i)=>{
  const area0=AREAS['p0']?.g0?.[String(curTime)]||1;
  const areaI=AREAS['p0']?.[s.id]?.[String(curTime)]||0;
  const ratio=Math.round(areaI/area0*100);
  const div=document.createElement('div');
  div.className='srow'; div.style.setProperty('--c',s.color);
  div.innerHTML=`<div class="sdot"></div>
    <div><div class="sname">${s.label}</div><div class="smps">${s.mps} m/s</div></div>
    <div class="sarea">${ratio}%</div>`;
  div.onclick=()=>{if(isPlaying){clearTimeout(holdTimer);isPlaying=false;document.getElementById('play-btn').textContent='▶';document.getElementById('play-btn').classList.remove('playing');}goTo(i);};
  srowsEl.appendChild(div);
  const dot=document.createElement('div');
  dot.className='dot'; dot.style.setProperty('--c',s.color);
  dot.onclick=()=>goTo(i);
  dotsEl.appendChild(dot);
});

map.whenReady(()=>{
  requestAnimationFrame(()=>{
    syncSize();
    redraw();
    updateUI();
  });
});
</script>
</body>
</html>
