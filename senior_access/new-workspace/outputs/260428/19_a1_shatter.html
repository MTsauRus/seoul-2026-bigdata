<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>산산조각 — 서울 노인의 보행권</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
body{background:#06111e;color:#dde6f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#hdr{background:#060e1a;border-bottom:1px solid #0e1f30;
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#hdr h1{font-size:.95rem;font-weight:700}
#hdr .sub{font-size:.63rem;color:#3a5368;margin-top:2px}
.ctrl{display:flex;align-items:center;gap:10px}
select{background:#0a1828;color:#7a99b0;border:1px solid #1a2c3e;border-radius:5px;padding:4px 8px;font-size:.7rem}
.tpill{padding:3px 9px;border-radius:999px;font-size:.65rem;cursor:pointer;
  border:1px solid #1a2c3e;background:transparent;color:#3a5368;transition:.15s}
.tpill.on{border-color:rgba(255,255,255,.25);color:#aec4d4;background:rgba(255,255,255,.04)}

#map-wrap{flex:1;position:relative;overflow:hidden}
#map{position:absolute;inset:0}
/* 파편 캔버스: 지도 위 */
#shard-cv{position:absolute;inset:0;pointer-events:none;z-index:600}

/* 우측 패널 */
#panel{
  position:absolute;top:14px;right:14px;z-index:700;width:200px;
  background:rgba(6,14,26,.88);border:1px solid rgba(255,255,255,.06);
  border-radius:12px;padding:14px;backdrop-filter:blur(10px);
}
.ptl{font-size:.6rem;color:#3a5368;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.srow{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;
  border:1px solid transparent;margin-bottom:4px;cursor:pointer;transition:all .35s;opacity:.28}
.srow.active{opacity:1;border-color:var(--c);background:color-mix(in srgb,var(--c) 10%,transparent)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--c);flex-shrink:0}
.sname{font-size:.7rem;color:#c9d9e8;line-height:1.2}
.smps{font-size:.58rem;color:#3a5368}
.sratio{font-size:.72rem;font-weight:700;color:var(--c);margin-left:auto}

/* 하단 손실 텍스트 */
#loss-banner{
  position:absolute;bottom:0;left:0;right:0;z-index:650;
  padding:20px 24px 16px;
  background:linear-gradient(transparent,rgba(6,14,26,.9) 50%);
  pointer-events:none;
}
#loss-big{font-size:3rem;font-weight:900;line-height:1;transition:color .5s;
  text-shadow:0 0 40px currentColor}
#loss-lbl{font-size:.72rem;color:#3a5368;margin-top:4px}

/* 재생 */
#play-wrap{
  position:absolute;bottom:16px;right:228px;z-index:700;
  display:flex;gap:6px;align-items:center;
}
#play-btn{width:36px;height:36px;border-radius:50%;
  border:1.5px solid #243548;background:rgba(59,130,246,.1);
  color:#3b82f6;font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s}
#play-btn.playing{border-color:#34A853;color:#34A853;background:rgba(52,168,83,.1)}
.dots{display:flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#1a2c3e;transition:all .3s;cursor:pointer}
.dot.on{background:var(--c);box-shadow:0 0 6px var(--c)}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <h1>산산조각</h1>
    <div class="sub">보행 속도가 느려질수록 도달권이 파편이 되어 사라진다</div>
  </div>
  <div class="ctrl">
    <div style="display:flex;gap:4px">
      <button class="tpill" onclick="setTime(15,this)">15분</button>
      <button class="tpill on" onclick="setTime(30,this)">30분</button>
      <button class="tpill" onclick="setTime(45,this)">45분</button>
    </div>
    <select id="sel-pt" onchange="onPtChange()"></select>
  </div>
</div>

<div id="map-wrap">

class Shard{
  constructor(x,y,w,h,color,vx,vy){
    this.x=x; this.y=y; this.w=w; this.h=h;
    this.color=color;
    this.vx=vx+(Math.random()-.5)*1.2;
    this.vy=vy+Math.random()*1.5;
    this.g=0.18+Math.random()*.1;
    this.rot=Math.random()*Math.PI*2;
    this.rotv=(Math.random()-.5)*.12;
    this.alpha=0.85;
    this.fade=0.013+Math.random()*.008;
    // 삼각형 vs 사각형 다양화
    this.pts=this._genPts();
  }
  _genPts(){
    const hw=this.w/2,hh=this.h/2;
    if(Math.random()<.4){
      // 삼각형
      return [[-hw,-hh],[hw,-hh*Math.random()],[0,hh]];
    }
    // 불규칙 사각형
    const jit=()=>(Math.random()-.5)*.4;
    return [[-hw+jit(),-hh+jit()],[hw+jit(),-hh+jit()],[hw+jit(),hh+jit()],[-hw+jit(),hh+jit()]];
  }
  update(){
    this.vy+=this.g;
    this.x+=this.vx;
    this.y+=this.vy;
    this.rot+=this.rotv;
    this.alpha-=this.fade;
  }
  draw(c){
    if(this.alpha<=0) return;
    c.save();
    c.globalAlpha=Math.max(0,this.alpha);
    c.translate(this.x,this.y);
    c.rotate(this.rot);
    c.fillStyle=this.color;
    c.strokeStyle='rgba(255,255,255,.15)';
    c.lineWidth=.5;
    c.beginPath();
    this.pts.forEach(([px,py],i)=>i?c.lineTo(px,py):c.moveTo(px,py));
    c.closePath();
    c.fill();
    c.stroke();
    c.restore();
  }
}

// 이전 폴리곤에서 새 폴리곤을 뺀 "사라지는 영역" 위의 격자점들 수집
function spawnShardsForTransition(fromFrame, color){
  const fromIso=ISO[curPt]?.[SPDS[fromFrame].id]?.[String(curTime)];
  if(!fromIso) return;
  const coords=fromIso.coordinates[0];

  // 바운딩박스
  let minLat=Infinity,maxLat=-Infinity,minLng=Infinity,maxLng=-Infinity;
  coords.forEach(([lng,lat])=>{
    minLat=Math.min(minLat,lat); maxLat=Math.max(maxLat,lat);
    minLng=Math.min(minLng,lng); maxLng=Math.max(maxLng,lng);
  });

  // 격자 샘플링으로 폴리곤 내부 컨테이너 좌표 수집
  const pts=[];
  const steps=22;
  for(let i=0;i<=steps;i++){
    for(let j=0;j<=steps;j++){
      const lat=minLat+(maxLat-minLat)*(i/steps);
      const lng=minLng+(maxLng-minLng)*(j/steps);
      if(pointInPoly(lat,lng,coords)){
        const p=map.latLngToContainerPoint([lat,lng]);
        pts.push([p.x,p.y]);
      }
    }
  }

  // 파편 생성: 중심점 향해 안쪽으로 폭발 (구심력)
  const cx2=cv.width/2, cy2=cv.height/2;
  pts.forEach(([px,py])=>{
    // 중심에서 멀수록 강하게 날아가게
    const dx=px-cx2, dy=py-cy2;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const force=(.5+Math.random()*.5);
    const sz=6+Math.random()*14;
    shards.push(new Shard(px,py,sz,sz*(.5+Math.random()),color,
      (dx/dist)*force*1.8,
      (dy/dist)*force*1.2+Math.random()*.8
    ));
  });
}

function pointInPoly(lat,lng,coords){
  let inside=false;
  for(let i=0,j=coords.length-1;i<coords.length;j=i++){
    const [xi,yi]=coords[i];
    const [xj,yj]=coords[j];
    if(((yi>lat)!==(yj>lat))&&(lng<(xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

function runShards(){
  if(shardRaf) cancelAnimationFrame(shardRaf);
  // 캔버스 크기 한 번만 확인 (tick 내 syncCv 호출 금지 — 매 프레임 리셋됨)
  syncCv();
  const W=cv.width, H=cv.height;
  function tick(){
    ctx.clearRect(0,0,W,H);
    shards=shards.filter(s=>s.alpha>0);
    shards.forEach(s=>{s.update();s.draw(ctx);});
    if(shards.length>0) shardRaf=requestAnimationFrame(tick);
    else{shardDone=true;shardRaf=null;ctx.clearRect(0,0,W,H);}
  }
  shardRaf=requestAnimationFrame(tick);
}

// ── 지도 GeoJSON 레이어 ────────────────────────────────────────────────────
function buildLayer(){
  if(geoLayer) map.removeLayer(geoLayer);
  const s=SPDS[curFrame];
  const iso=ISO[curPt]?.[s.id]?.[String(curTime)];
  if(!iso) return;
  geoLayer=L.geoJSON(iso,{
    style:{fillColor:s.color,fillOpacity:.25,color:s.color,weight:2,opacity:.8,
      smoothFactor:0}
  }).addTo(map);
}

// ── UI 업데이트 ──────────────────────────────────────────────────────────────
function updateUI(){
  const s=SPDS[curFrame];
  const area0=AREAS[curPt]?.g0?.[String(curTime)]||1;
  const areaI=AREAS[curPt]?.[s.id]?.[String(curTime)]||0;
  const ratio=Math.round(areaI/area0*100);
  const lb=document.getElementById('loss-big');
  lb.textContent=ratio+'%';
  lb.style.color=s.color;
  lb.style.textShadow=`0 0 40px ${s.color}`;
  document.getElementById('loss-lbl').textContent=
    curFrame===0?`${areaI.toFixed(1)} km² 도달 가능 · 기준값`:
    `${areaI.toFixed(1)} km² 도달 가능 · 일반인 대비 ${ratio}% 유지`;
  document.querySelectorAll('.srow').forEach((r,i)=>r.classList.toggle('active',i===curFrame));
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('on',i===curFrame);
    d.style.setProperty('--c',SPDS[i].color);
  });
}

// ── 전환 ─────────────────────────────────────────────────────────────────────
function goTo(newFrame){
  if(newFrame>curFrame){
    // 다운 전환: 파편 애니메이션
    const prevColor=SPDS[curFrame].color;
    spawnShardsForTransition(curFrame,prevColor);
    runShards();
  } else {
    // 업 전환: 그냥 전환
    shards=[];
    if(shardRaf){cancelAnimationFrame(shardRaf);shardRaf=null;}
    syncCv();ctx.clearRect(0,0,cv.width,cv.height);
  }
  curFrame=newFrame;
  buildLayer();
  updateUI();
  if(isPlaying) scheduleNext();
}

function scheduleNext(){
  clearTimeout(holdTimer);
  holdTimer=setTimeout(()=>goTo((curFrame+1)%4),HOLD);
}

function togglePlay(){
  isPlaying=!isPlaying;
  const btn=document.getElementById('play-btn');
  btn.textContent=isPlaying?'⏸':'▶';
  btn.classList.toggle('playing',isPlaying);
  if(isPlaying) scheduleNext();
  else clearTimeout(holdTimer);
}

function setTime(t,btn){
  curTime=t;
  document.querySelectorAll('.tpill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  shards=[]; if(shardRaf){cancelAnimationFrame(shardRaf);shardRaf=null;}
  syncCv(); ctx.clearRect(0,0,cv.width,cv.height);
  buildLayer(); updateUI();
}

function onPtChange(){
  curPt=document.getElementById('sel-pt').value;
  const pt=PTS.find(p=>p.id===curPt);
  if(pt) map.setView([pt.lat,pt.lon],13,{animate:false});
  shards=[]; if(shardRaf){cancelAnimationFrame(shardRaf);shardRaf=null;}
  syncCv(); ctx.clearRect(0,0,cv.width,cv.height);
  buildLayer(); updateUI();
}

// ── DOM 초기화 ───────────────────────────────────────────────────────────────
const selPt=document.getElementById('sel-pt');
PTS.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;selPt.appendChild(o);});

const srowsEl=document.getElementById('srows');
const dotsEl=document.getElementById('dots');
SPDS.forEach((s,i)=>{
  const area0=AREAS['p0']?.g0?.[String(curTime)]||1;
  const areaI=AREAS['p0']?.[s.id]?.[String(curTime)]||0;
  const div=document.createElement('div');
  div.className='srow'; div.style.setProperty('--c',s.color);
  div.innerHTML=`<div class="sdot"></div>
    <div><div class="sname">${s.label}</div><div class="smps">${s.mps} m/s</div></div>
    <div class="sratio">${Math.round(areaI/area0*100)}%</div>`;
  div.onclick=()=>goTo(i);
  srowsEl.appendChild(div);
  const dot=document.createElement('div');
  dot.className='dot'; dot.style.setProperty('--c',s.color);
  dot.onclick=()=>goTo(i);
  dotsEl.appendChild(dot);
});

map.whenReady(()=>requestAnimationFrame(()=>{
  syncCv();
  buildLayer();
  updateUI();
}));
</script>
</body>
</html>
