<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>서울 노인 보행 접근성 — 분(分)의 격차</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
         background: #0F172A; color: #E2E8F0; height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  header {
    background: #1E293B;
    border-bottom: 1px solid #334155;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 20px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 700; color: #F1F5F9; }
  header p  { font-size: 12px; color: #94A3B8; }

  /* ── Layer switcher tabs ── */
  .tabs {
    display: flex; gap: 6px; margin-left: auto;
  }
  .tab {
    padding: 6px 16px; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; border: 2px solid transparent;
    transition: all .2s;
  }
  .tab.elev   { background: #0277BD22; border-color: #0277BD; color: #4FC3F7; }
  .tab.clinic { background: #2E7D3222; border-color: #388E3C; color: #81C784; }
  .tab.active { color: #fff; }
  .tab.elev.active   { background: #0277BD; }
  .tab.clinic.active { background: #388E3C; }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Map ── */
  #map { flex: 1; }

  /* ── Side panel ── */
  .side {
    width: 340px; flex-shrink: 0;
    background: #1E293B;
    border-left: 1px solid #334155;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .side-section {
    padding: 14px 16px;
    border-bottom: 1px solid #334155;
  }
  .side-section h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
    color: #64748B; margin-bottom: 8px;
  }

  /* KPI cards */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi {
    background: #0F172A; border-radius: 8px; padding: 10px 12px;
    border-left: 3px solid #334155;
  }
  .kpi .label { font-size: 11px; color: #94A3B8; margin-bottom: 4px; }
  .kpi .value { font-size: 22px; font-weight: 700; color: #F1F5F9; }
  .kpi .sub   { font-size: 11px; color: #64748B; margin-top: 2px; }
  .kpi.danger .value { color: #F87171; }
  .kpi.ok     .value { color: #4ADE80; }

  /* Popup info box */
  #info-box {
    flex: 1; overflow-y: auto; padding: 14px 16px;
  }
  #info-box .placeholder {
    color: #475569; font-size: 13px; text-align: center;
    margin-top: 40px; line-height: 1.8;
  }

  .info-title {
    font-size: 15px; font-weight: 700; color: #F1F5F9; margin-bottom: 12px;
    border-bottom: 1px solid #334155; padding-bottom: 8px;
  }
  .info-badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; margin-bottom: 10px;
  }
  .badge-ok     { background: #14532D; color: #86EFAC; }
  .badge-blind  { background: #7F1D1D; color: #FCA5A5; }
  .badge-nonres { background: #1E293B; color: #64748B; border: 1px solid #334155; }

  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid #1E293B; font-size: 13px;
  }
  .info-row .k { color: #94A3B8; }
  .info-row .v { color: #F1F5F9; font-weight: 600; }

  .info-sgg {
    margin-top: 14px; background: #0F172A; border-radius: 8px; padding: 12px;
  }
  .info-sgg h4 { font-size: 12px; color: #64748B; margin-bottom: 8px; }

  .bar-wrap { margin: 5px 0; }
  .bar-label { font-size: 11px; color: #94A3B8; display: flex; justify-content: space-between; }
  .bar-track { background: #1E293B; border-radius: 4px; height: 8px; margin-top: 3px; }
  .bar-fill  { height: 8px; border-radius: 4px; transition: width .4s; }

  /* Legend */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 10px 16px;
    background: #1E293B;
    border-top: 1px solid #334155;
    font-size: 12px;
    flex-shrink: 0;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot  { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #0F172A; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>분(分)의 격차 — 서울 노인 보행 접근성</h1>
    <p>노인 보행속도(0.78 m/s) 기준 15분 이내 도달 가능 여부 · 거주지 집계구 11,520개</p>
  </div>
  <div class="tabs">
    <div class="tab elev active" id="tab-elev" onclick="switchLayer('elev')">🚇 지하철 엘리베이터</div>
    <div class="tab clinic" id="tab-clinic" onclick="switchLayer('clinic')">🏥 의원(일반진료)</div>
  </div>
</header>

<div class="main">
  <div id="map"></div>

  <aside class="side">
    <!-- KPIs -->
    <div class="side-section" id="kpi-section">
      <h3 id="kpi-title">지하철 엘리베이터 접근성 현황</h3>
      <div class="kpi-grid" id="kpi-grid">
        <!-- JS로 채움 -->
      </div>
    </div>

    <!-- Click info -->
    <div id="info-box">
      <div class="placeholder">
        🗺️ 지도에서 집계구를<br>클릭하면 상세 정보가<br>여기 표시됩니다
      </div>
    </div>

    <!-- Legend -->
    <div class="legend" id="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#E53935"></div> 사각지대 (미도달)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#B3E5FC"></div> 도달 가능</div>
      <div class="legend-item"><div class="legend-dot" style="background:#DDDDDD"></div> 비거주지역</div>
      <div class="legend-item"><div class="legend-dot" style="background:#01579B; border-radius:50%"></div> 엘리베이터</div>
    </div>
  </aside>
</div>

<script>
// ── Map init ──────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [37.5665, 126.978],
  zoom: 11,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

// ── State ─────────────────────────────────────────────────────────────
let currentLayer = 'elev';
let oaLayer = null;
let elevLayer = null;
let clinicLayer = null;
let selectedLayer = null;
let oaData = null;
let statsData = {};

// ── Color helpers ─────────────────────────────────────────────────────
const COLORS = {
  elev: {
    blind: '#E53935',
    ok:    '#B3E5FC',
    nonres:'#2D3748',
    point: '#01579B',
    bar:   '#0277BD',
  },
  clinic: {
    blind: '#FF6F00',
    ok:    '#C8E6C9',
    nonres:'#2D3748',
    point: '#1B5E20',
    bar:   '#388E3C',
  }
};

function getColor(props, layer) {
  const C = COLORS[layer];
  if (!props.residential) return C.nonres;
  const reach = layer === 'elev' ? props.elev_reachable : props.clinic_reachable;
  return reach ? C.ok : C.blind;
}

function getOpacity(props) {
  return props.residential ? 0.85 : 0.5;
}

// ── KPI data ──────────────────────────────────────────────────────────
const KPI = {
  elev: [
    { label: '분석 거주지 OA', value: '11,520개', sub: '전체 19,097개 중', cls: '' },
    { label: '엘리베이터 총 개수', value: '552개', sub: '서울 전역 지하철역', cls: '' },
    { label: '15분 내 도달 가능', value: '56.5%', sub: '6,510개 OA', cls: 'ok' },
    { label: '사각지대 OA', value: '5,010개', sub: '43.5% 미도달', cls: 'danger' },
  ],
  clinic: [
    { label: '분석 거주지 OA', value: '11,520개', sub: '전체 19,097개 중', cls: '' },
    { label: '의원 총 개수', value: '11,173개', sub: '서울 전역 일반진료', cls: '' },
    { label: '15분 내 도달 가능', value: '88.1%', sub: '10,153개 OA', cls: 'ok' },
    { label: '사각지대 OA', value: '1,367개', sub: '11.9% 미도달', cls: 'danger' },
  ]
};

function renderKPI(layer) {
  const grid = document.getElementById('kpi-grid');
  const title = document.getElementById('kpi-title');
  title.textContent = layer === 'elev'
    ? '지하철 엘리베이터 접근성 현황'
    : '의원(일반진료) 접근성 현황';
  grid.innerHTML = KPI[layer].map(k => `
    <div class="kpi ${k.cls}">
      <div class="label">${k.label}</div>
      <div class="value">${k.value}</div>
      <div class="sub">${k.sub}</div>
    </div>
  `).join('');
}

// ── OA click popup ────────────────────────────────────────────────────
function showInfo(props) {
  const C = COLORS[currentLayer];
  const reach = currentLayer === 'elev' ? props.elev_reachable : props.clinic_reachable;
  const isRes = props.residential === 1;

  let badge, statusText;
  if (!isRes) {
    badge = '<span class="info-badge badge-nonres">비거주지역</span>';
    statusText = '공원·하천·산지 등 분석 제외 지역';
  } else if (reach) {
    badge = '<span class="info-badge badge-ok">✓ 도달 가능</span>';
    statusText = '노인 보행속도 기준 15분 이내 도달';
  } else {
    badge = '<span class="info-badge badge-blind">✗ 사각지대</span>';
    statusText = '15분 이내 도달 불가';
  }

  const facilityName = currentLayer === 'elev' ? '지하철 엘리베이터' : '의원(일반진료)';
  const sggPct  = currentLayer === 'elev' ? props.sgg_elev_pct   : props.sgg_clinic_pct;
  const sggCnt  = currentLayer === 'elev' ? props.sgg_elev_count : props.sgg_clinic_count;
  const sggBlind= currentLayer === 'elev' ? props.sgg_elev_blind : props.sgg_clinic_blind;
  const barColor= C.bar;

  document.getElementById('info-box').innerHTML = `
    <div class="info-title">📍 집계구 상세 정보</div>
    ${badge}
    <p style="font-size:12px;color:#94A3B8;margin-bottom:10px">${statusText}</p>

    <div class="info-row"><span class="k">집계구 코드</span><span class="v">${props.oa_code}</span></div>
    <div class="info-row"><span class="k">자치구</span><span class="v">${props.sgg_name}</span></div>
    <div class="info-row">
      <span class="k">${facilityName} 접근</span>
      <span class="v" style="color:${reach ? '#4ADE80' : '#F87171'}">${reach ? '가능 ✓' : '불가 ✗'}</span>
    </div>
    <div class="info-row">
      <span class="k">추정 독거노인 수</span>
      <span class="v">${props.solo_senior_est.toFixed(0)}명</span>
    </div>

    <div class="info-sgg">
      <h4>🏙 ${props.sgg_name} 자치구 전체 현황</h4>

      <div class="info-row" style="border:none;padding:4px 0">
        <span class="k">${facilityName} 수</span>
        <span class="v">${sggCnt.toLocaleString()}개</span>
      </div>
      <div class="info-row" style="border:none;padding:4px 0">
        <span class="k">사각지대 OA 수</span>
        <span class="v" style="color:#F87171">${sggBlind.toLocaleString()}개</span>
      </div>
      <div class="info-row" style="border:none;padding:4px 0">
        <span class="k">독거노인 추정 합계</span>
        <span class="v">${props.sgg_solo_senior.toLocaleString()}명</span>
      </div>
      <div class="info-row" style="border:none;padding:4px 0">
        <span class="k">분석 OA 수</span>
        <span class="v">${props.sgg_total_oa.toLocaleString()}개</span>
      </div>

      <div class="bar-wrap" style="margin-top:10px">
        <div class="bar-label">
          <span>도달 가능 비율</span>
          <span>${sggPct}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${sggPct}%;background:${barColor}"></div>
        </div>
      </div>

      <div class="bar-wrap">
        <div class="bar-label">
          <span>사각지대 비율</span>
          <span>${(100-sggPct).toFixed(1)}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${100-sggPct}%;background:#E53935"></div>
        </div>
      </div>
    </div>
  `;
}

// ── OA layer ──────────────────────────────────────────────────────────
function buildOALayer(data, layer) {
  if (oaLayer) map.removeLayer(oaLayer);

  oaLayer = L.geoJSON(data, {
    style: f => ({
      fillColor: getColor(f.properties, layer),
      fillOpacity: getOpacity(f.properties),
      color: '#1E293B',
      weight: 0.3,
    }),
    onEachFeature: (f, lyr) => {
      lyr.on({
        click: e => {
          L.DomEvent.stopPropagation(e);
          if (selectedLayer) selectedLayer.setStyle({ color: '#1E293B', weight: 0.3 });
          lyr.setStyle({ color: '#FCD34D', weight: 2 });
          selectedLayer = lyr;
          showInfo(f.properties);
        },
        mouseover: e => {
          if (lyr !== selectedLayer)
            lyr.setStyle({ color: '#94A3B8', weight: 1 });
        },
        mouseout: e => {
          if (lyr !== selectedLayer)
            lyr.setStyle({ color: '#1E293B', weight: 0.3 });
        },
      });
    }
  }).addTo(map);
}

// ── Facility layers ───────────────────────────────────────────────────
function buildElevLayer(data) {
  if (elevLayer) map.removeLayer(elevLayer);
  elevLayer = L.geoJSON(data, {
    pointToLayer: (f, latlng) => L.circleMarker(latlng, {
      radius: 5, fillColor: '#01579B', color: '#fff',
      weight: 1, fillOpacity: 0.9
    }),
    onEachFeature: (f, lyr) => {
      const p = f.properties;
      lyr.bindTooltip(`🚇 ${p.station || p.name || '지하철 엘리베이터'}`, { direction: 'top', offset: [0,-6] });
    }
  });
}

function buildClinicLayer(data) {
  if (clinicLayer) map.removeLayer(clinicLayer);
  clinicLayer = L.geoJSON(data, {
    pointToLayer: (f, latlng) => L.circleMarker(latlng, {
      radius: 3, fillColor: '#1B5E20', color: '#fff',
      weight: 0.5, fillOpacity: 0.6
    }),
    onEachFeature: (f, lyr) => {
      lyr.bindTooltip(`🏥 ${f.properties.name || '의원'}`, { direction: 'top', offset: [0,-4] });
    }
  });
}

// ── Layer switch ──────────────────────────────────────────────────────
function updateLegend(layer) {
  const C = COLORS[layer];
  const facilityLabel = layer === 'elev' ? '엘리베이터' : '의원';
  document.getElementById('legend').innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:${C.blind}"></div> 사각지대 (미도달)</div>
    <div class="legend-item"><div class="legend-dot" style="background:${C.ok}"></div> 도달 가능</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3D4A5C"></div> 비거주지역</div>
    <div class="legend-item"><div class="legend-dot" style="background:${C.point};border-radius:50%"></div> ${facilityLabel} 위치</div>
  `;
}

function switchLayer(layer) {
  currentLayer = layer;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + layer).classList.add('active');

  if (oaData) buildOALayer(oaData, layer);

  // Toggle facility points
  if (layer === 'elev') {
    if (clinicLayer && map.hasLayer(clinicLayer)) map.removeLayer(clinicLayer);
    if (elevLayer) elevLayer.addTo(map);
  } else {
    if (elevLayer && map.hasLayer(elevLayer)) map.removeLayer(elevLayer);
    if (clinicLayer) clinicLayer.addTo(map);
  }

  renderKPI(layer);
  updateLegend(layer);
  document.getElementById('info-box').innerHTML =
    '<div class="placeholder">🗺️ 지도에서 집계구를<br>클릭하면 상세 정보가<br>여기 표시됩니다</div>';
  selectedLayer = null;
}

// ── Data load ─────────────────────────────────────────────────────────
async function loadData() {
  const [oaRes, elevRes, clinicRes] = await Promise.all([
    fetch('oa_accessibility.geojson').then(r => r.json()),
    fetch('elevators.geojson').then(r => r.json()),
    fetch('clinics.geojson').then(r => r.json()),
  ]);

  oaData = oaRes;
  buildOALayer(oaData, 'elev');
  buildElevLayer(elevRes);
  buildClinicLayer(clinicRes);

  // Start with elev layer points visible
  elevLayer.addTo(map);

  renderKPI('elev');
  updateLegend('elev');
}

// Map click to deselect
map.on('click', () => {
  if (selectedLayer) selectedLayer.setStyle({ color: '#1E293B', weight: 0.3 });
  selectedLayer = null;
  document.getElementById('info-box').innerHTML =
    '<div class="placeholder">🗺️ 지도에서 집계구를<br>클릭하면 상세 정보가<br>여기 표시됩니다</div>';
});

loadData();
</script>
</body>
</html>
